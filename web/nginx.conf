# ScriptureEngine — nginx site config
# Place in /etc/nginx/sites-available/scriptureengine
# then: ln -s /etc/nginx/sites-available/scriptureengine /etc/nginx/sites-enabled/
# then: systemctl reload nginx
#
# Assumes Let's Encrypt SSL certs for scriptureengine.org
# Obtain with: certbot --nginx -d scriptureengine.org -d www.scriptureengine.org

upstream scripture_api {
    # 2 workers — uvicorn manages both on port 8000
    server 127.0.0.1:8000;
}

# Longer timeouts for the origin server — RAM cache loading at startup
# and LLM chat responses can take several minutes
proxy_connect_timeout 30s;
proxy_send_timeout 60s;
proxy_read_timeout 300s;

server {
    listen 80;
    server_name scriptureengine.org www.scriptureengine.org;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name scriptureengine.org www.scriptureengine.org;

    ssl_certificate     /etc/letsencrypt/live/scriptureengine.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/scriptureengine.org/privkey.pem;

    # Compression
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;

    # Static frontend
    root /var/www/scripture/frontend/dist;
    index index.html;

    # API caching — verse lookups are immutable, cache for 60s
    location /api/v1/verses/ {
        proxy_pass http://scripture_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Cache verse+guide responses for 60 seconds
        # Verses don't change — safe to cache
        expires 60s;
        add_header Cache-Control "public, must-revalidate";
    }

    # Search results — short cache
    location /api/v1/search {
        proxy_pass http://scripture_api;
        proxy_set_header Host $host;
        expires 10s;
        add_header Cache-Control "public, must-revalidate";
    }

    # Info/health — no cache
    location /api/v1/info {
        proxy_pass http://scripture_api;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache";
    }

    location /api/v1/health {
        proxy_pass http://scripture_api;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache";
    }

    # Everything else — pass through
    location /api/ {
        proxy_pass http://scripture_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback — serve index.html for unknown routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
