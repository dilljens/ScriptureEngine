# Nginx config for scripture knowledge engine.
# Place at /etc/nginx/sites-available/scripture
# then: ln -s /etc/nginx/sites-available/scripture /etc/nginx/sites-enabled/
# then: systemctl reload nginx

upstream scripture_api {
    server 127.0.0.1:8000;
    server 127.0.0.1:8001;
    server 127.0.0.1:8002;
    server 127.0.0.1:8003;
}

server {
    listen 80;
    server_name scripture.example.com;

    # Compress JSON responses
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;

    # Static frontend
    # Point this to your React build directory
    root /home/dillon/_code/scripture-explorer/web/frontend/dist;
    index index.html;

    # API caching — verse lookups are immutable, cache for 60s
    location /api/v1/verses/ {
        proxy_pass http://scripture_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Cache verse+guide responses for 60 seconds
        # Verses don't change — safe to cache
        expires 60s;
        add_header Cache-Control "public, must-revalidate";
    }

    # Search results — short cache
    location /api/v1/search {
        proxy_pass http://scripture_api;
        proxy_set_header Host $host;
        expires 10s;
        add_header Cache-Control "public, must-revalidate";
    }

    # Info/health — no cache
    location /api/v1/info {
        proxy_pass http://scripture_api;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache";
    }

    location /api/v1/health {
        proxy_pass http://scripture_api;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache";
    }

    # Everything else — pass through
    location /api/ {
        proxy_pass http://scripture_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback — serve index.html for unknown routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
