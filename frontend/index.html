<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Scripture Engine</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/icon-192-v2.png" />
    <link rel="apple-touch-icon" href="/icon-192-v2.png" />
    <script>try{var s=JSON.parse(localStorage.getItem('scripture_settings')||'{}'),d=s.darkMode;if(d===undefined||d===null){var m=window.matchMedia('(prefers-color-scheme:dark)');if(m.matches)document.documentElement.classList.add('dark')}else if(d)document.documentElement.classList.add('dark')}catch(e){}</script>
    <script defer src="/debug-reporter.js"></script>
  </head>
  <body class="bg-white dark:bg-neutral-950 text-neutral-900 dark:text-neutral-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
