name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  GO_VERSION: '1.23'

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx vite build --logLevel error
        working-directory: frontend
      - name: Check static files
        run: |
          for f in dist/manifest.json dist/sw.js dist/index.html; do
            test -f "frontend/$f" || (echo "Missing: $f"; exit 1)
          done
        working-directory: .

  go-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go-srs/go.sum
      - run: go test ./internal/... -count=1
        working-directory: backend/go-srs

  api-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r web/requirements.txt biblical-transliteration
        working-directory: .
      - name: Test API imports
        run: python3 -c "
          import sys;
          sys.path.insert(0,'.');
          sys.path.insert(0,'web');
          from server import app;
          print('API imports OK')
        "
        working-directory: .
