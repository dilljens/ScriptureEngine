name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  GO_VERSION: '1.23'
  PYTHON_VERSION: '3.12'

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx vite build --logLevel error
        working-directory: frontend
      - name: Check static files
        run: |
          for f in dist/manifest.json dist/sw.js dist/index.html; do
            test -f "frontend/$f" || (echo "Missing: $f"; exit 1)
          done
        working-directory: .

  go-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go-srs/go.sum
      - run: go test ./internal/... -count=1
        working-directory: backend/go-srs

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - name: Ruff check
        run: ruff check --output-format=github
      - name: Count errors
        run: |
          errors=$(ruff check --statistics | tail -1 | grep -oP '^\s*\d+' || echo "0")
          echo "Ruff errors: $errors"

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: web/requirements.txt
      - run: pip install -r web/requirements.txt biblical-transliteration fastembed sentence-transformers
        working-directory: .
      - name: Create test fixture database
        run: |
          python3 scripts/create_test_db.py
      - name: Run tests
        run: |
          python3 -m pytest tests/ -q --tb=short -x
        timeout-minutes: 5

  api-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r web/requirements.txt biblical-transliteration
        working-directory: .
      - name: Test API imports
        run: |
          python3 -c "import sys; sys.path.insert(0,'.'); sys.path.insert(0,'web'); from server import app; print('API imports OK')"
        working-directory: .
